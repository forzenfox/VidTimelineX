name: CI for Non-master Branches

on:
  pull_request:
    branches: [master]

permissions:
  contents: read

concurrency:
  group: "ci-${{ github.ref }}"
  cancel-in-progress: true

jobs:
  frontend-ci:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18.x, 20.x]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Static analysis (Lint)
        run: npm run lint
        working-directory: frontend

      - name: Run tests with coverage
        run: npm test -- --coverage --watchAll=false --ci
        working-directory: frontend

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          directory: ./frontend/coverage
          flags: frontend
          name: frontend-coverage-${{ matrix.node-version }}
          fail_ci_if_error: false
          verbose: true

      - name: Upload coverage report as artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report-${{ matrix.node-version }}
          path: ./frontend/coverage
          retention-days: 30

      - name: Check coverage thresholds
        run: |
          echo "检查覆盖率阈值..."
          COVERAGE_OUTPUT=$(npm test -- --coverage --watchAll=false --ci 2>&1)
          echo "$COVERAGE_OUTPUT"
          
          # 提取覆盖率数值
          LINES=$(echo "$COVERAGE_OUTPUT" | grep "All files" | awk '{print $10}' | tr -d '%')
          FUNCTIONS=$(echo "$COVERAGE_OUTPUT" | grep "All files" | awk '{print $8}' | tr -d '%')
          BRANCHES=$(echo "$COVERAGE_OUTPUT" | grep "All files" | awk '{print $6}' | tr -d '%')
          STATEMENTS=$(echo "$COVERAGE_OUTPUT" | grep "All files" | awk '{print $4}' | tr -d '%')
          
          echo "行覆盖率: $LINES%"
          echo "函数覆盖率: $FUNCTIONS%"
          echo "分支覆盖率: $BRANCHES%"
          echo "语句覆盖率: $STATEMENTS%"
          
          # 检查是否达到阈值
          if (( $(echo "$LINES < 68" | bc -l) )); then
            echo "❌ 行覆盖率 $LINES% 未达到阈值 68%"
            exit 1
          fi
          
          if (( $(echo "$FUNCTIONS < 65" | bc -l) )); then
            echo "❌ 函数覆盖率 $FUNCTIONS% 未达到阈值 65%"
            exit 1
          fi
          
          if (( $(echo "$BRANCHES < 65" | bc -l) )); then
            echo "❌ 分支覆盖率 $BRANCHES% 未达到阈值 65%"
            exit 1
          fi
          
          echo "✅ 所有覆盖率阈值检查通过！"
        shell: bash
        working-directory: frontend

      - name: Build application
        run: npm run build
        working-directory: frontend
        env:
          VITE_BASE_URL: /

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
        working-directory: frontend

      - name: Start application for E2E tests
        run: npm run preview &
        working-directory: frontend
        env:
          PORT: 3000

      - name: Wait for application to be ready
        run: npx wait-on http://localhost:3000 --timeout 60000

      - name: Run E2E tests
        run: npx playwright test --project=chromium
        working-directory: frontend
        env:
          BASE_URL: http://localhost:3000

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: ./frontend/playwright-report/
          retention-days: 30

  backend-ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt

      - name: Run tests
        run: |
          cd backend
          python -m pytest tests/ -v
